<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Pi App</title>

    <!-- تحميل مكتبة Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<h2>تطبيق Pi</h2>

<button onclick="authUser()">تسجيل الدخول باستخدام Pi</button>

<script>
// تهيئة Pi SDK
let piReady = false;

async function initializePi() {
    try {
        await Pi.init({
            version: "2.0",
            sandbox: true
        });

        piReady = true;
        console.log("Pi SDK initialized successfully");
    } catch (error) {
        console.error("Failed to initialize Pi SDK:", error);
    }
}

// تشغيل التهيئة عند تحميل الصفحة
window.addEventListener("load", initializePi);

// دالة تسجيل الدخول
async function authUser() {
    if (!piReady) {
        alert("يرجى الانتظار حتى تكتمل تهيئة Pi SDK.");
        return;
    }

    try {
        const scopes = ["username", "payments"];

        const auth = await Pi.authenticate(
            scopes,
            onIncompletePaymentFound
        );

        alert(`أهلاً بك ${auth.user.username}`);

        window.location.href = "dashboard.html";

    } catch (error) {
        console.error("فشل تسجيل الدخول:", error);
        alert("تأكد من فتح التطبيق من داخل Pi Browser الرسمي.");
    }
}

// معالجة المدفوعات غير المكتملة
function onIncompletePaymentFound(payment) {
    console.log("Incomplete payment found:", payment);
}
</script>

</body>
</html>
